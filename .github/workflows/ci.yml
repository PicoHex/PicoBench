name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  DOTNET_VERSION: 10.0.x
  DOTNET_CLI_TELEMETRY_OPTOUT: 1

jobs:
  build-and-test:
    name: Build and test (${{ matrix.logical-target }})
    runs-on: ${{ matrix.runs-on }}
    timeout-minutes: 15
    strategy:
      fail-fast: false
      matrix:
        include:
          - logical-target: win-x64
            runs-on: windows-latest
          - logical-target: win-arm64
            runs-on: windows-11-arm
          - logical-target: linux-x64
            runs-on: ubuntu-latest
          - logical-target: linux-arm64
            runs-on: ubuntu-24.04-arm
          - logical-target: osx-arm64
            runs-on: macos-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: ${{ env.DOTNET_VERSION }}
          cache: true
          cache-dependency-path: |
            **/*.csproj
            global.json

      - name: Show logical target
        run: echo Testing ${{ matrix.logical-target }}

      - name: Restore dependencies
        run: dotnet restore PicoBench.slnx -p:UseProjectReferences=true

      - name: Build
        run: dotnet build PicoBench.slnx --configuration Release --no-restore -p:UseProjectReferences=true

      - name: Run tests
        run: dotnet test --project tests/PicoBench.Tests/PicoBench.Tests.csproj --configuration Release --no-build --verbosity normal --timeout 120s --no-progress --no-ansi -p:UseProjectReferences=true

  aot-validation:
    name: AOT validation (${{ matrix.logical-target }})
    runs-on: ${{ matrix.runs-on }}
    timeout-minutes: 20
    strategy:
      fail-fast: false
      matrix:
        include:
          - logical-target: win-x64
            runs-on: windows-latest
            rid: win-x64
          - logical-target: win-arm64
            runs-on: windows-11-arm
            rid: win-arm64
          - logical-target: linux-x64
            runs-on: ubuntu-latest
            rid: linux-x64
          - logical-target: linux-arm64
            runs-on: ubuntu-24.04-arm
            rid: linux-arm64
          - logical-target: osx-arm64
            runs-on: macos-latest
            rid: osx-arm64

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: ${{ env.DOTNET_VERSION }}
          cache: true
          cache-dependency-path: |
            **/*.csproj
            global.json

      - name: Show logical target
        run: echo Validating AOT for ${{ matrix.logical-target }}

      - name: Install Linux AOT prerequisites
        if: startsWith(matrix.rid, 'linux-')
        run: sudo apt-get update && sudo apt-get install -y clang zlib1g-dev

      - name: Pack PicoBench for package-consumption validation
        run: dotnet pack src/PicoBench/PicoBench.csproj --configuration Release --output ./artifacts/aot-pack -p:Version=0.0.0-ci.${{ github.run_number }} -p:UseProjectReferences=false -p:ContinuousIntegrationBuild=true -p:Deterministic=true

      - name: Create temporary AOT validation app
        shell: pwsh
        run: |
          Remove-Item -Recurse -Force ./artifacts/aot-app -ErrorAction SilentlyContinue
          dotnet new console --framework net10.0 --output ./artifacts/aot-app
          dotnet add ./artifacts/aot-app/aot-app.csproj package PicoBench --version 0.0.0-ci.${{ github.run_number }} --source ./artifacts/aot-pack
          @'
          using System.Threading;
          using PicoBench;

          var suite = BenchmarkRunner.Run<SampleBenchmarks>(BenchmarkConfig.Quick);
          Console.WriteLine($"Benchmarks: {suite.Results.Count}");

          [BenchmarkClass]
          public partial class SampleBenchmarks
          {
              [Benchmark(Baseline = true)]
              public void Baseline() => Thread.SpinWait(32);

              [Benchmark]
              public void Candidate() => Thread.SpinWait(16);
          }
          '@ | Set-Content ./artifacts/aot-app/Program.cs

      - name: Ensure package consumers load the bundled generator
        shell: pwsh
        run: |
          $propsPath = "./artifacts/aot-app/Directory.Build.props"
          @'
          <Project>
            <ItemGroup>
              <Analyzer Include="$(NuGetPackageRoot)picobench/0.0.0-ci.${{ github.run_number }}/buildTransitive/PicoBench.Generators/analyzers/dotnet/cs/PicoBench.Generators.dll" />
            </ItemGroup>
          </Project>
          '@ | Set-Content $propsPath

      - name: Publish AOT validation app
        run: dotnet publish ./artifacts/aot-app/aot-app.csproj --configuration Release --framework net10.0 --runtime ${{ matrix.rid }} --self-contained -p:PublishAot=true
