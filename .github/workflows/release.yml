name: Release

on:
  push:
    tags: ['v*']
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: false

env:
  DOTNET_VERSION: 10.0.x
  DOTNET_CLI_TELEMETRY_OPTOUT: 1

jobs:
  pack:
    name: Pack
    runs-on: ubuntu-latest
    timeout-minutes: 15
    permissions:
      contents: read

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: ${{ env.DOTNET_VERSION }}
          cache: true
          cache-dependency-path: |
            **/*.csproj
            global.json

      - name: Extract version from tag
        id: version
        shell: bash
        run: echo "version=${GITHUB_REF#refs/tags/v}" >> "$GITHUB_OUTPUT"

      - name: Restore dependencies
        run: dotnet restore PicoBench.slnx -p:UseProjectReferences=true

      - name: Build
        run: dotnet build PicoBench.slnx --configuration Release --no-restore -p:Version=${{ steps.version.outputs.version }} -p:UseProjectReferences=true

      - name: Restore package-consumption pack path
        run: dotnet restore src/PicoBench/PicoBench.csproj -p:Version=${{ steps.version.outputs.version }} -p:UseProjectReferences=false

      - name: Pack NuGet packages
        shell: bash
        run: |
          rm -rf ./artifacts/nupkg
          mkdir -p ./artifacts/nupkg
          dotnet pack src/PicoBench/PicoBench.csproj \
            --configuration Release \
            --no-restore \
            --output ./artifacts/nupkg \
            -p:Version=${{ steps.version.outputs.version }} \
            -p:UseProjectReferences=false \
            -p:ContinuousIntegrationBuild=true \
            -p:Deterministic=true

      - name: Upload packages
        uses: actions/upload-artifact@v4
        with:
          name: nupkg
          path: |
            ./artifacts/nupkg/*.nupkg
            ./artifacts/nupkg/*.snupkg

  publish:
    name: Publish
    runs-on: ubuntu-latest
    needs: pack
    environment: release
    permissions:
      contents: write

    steps:
      - name: Download packages
        uses: actions/download-artifact@v4
        with:
          name: nupkg
          path: ./artifacts/nupkg

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: ${{ env.DOTNET_VERSION }}

      - name: Extract version from tag
        id: version
        shell: bash
        run: echo "version=${GITHUB_REF#refs/tags/v}" >> "$GITHUB_OUTPUT"

      - name: Publish to NuGet.org
        shell: bash
        run: |
          for file in ./artifacts/nupkg/*.nupkg; do
            if [[ "$file" != *.snupkg ]] && [[ "$file" != *.symbols.nupkg ]]; then
              dotnet nuget push "$file" \
                --api-key "${{ secrets.NUGET_API_KEY }}" \
                --source https://api.nuget.org/v3/index.json \
                --skip-duplicate
            fi
          done

      - name: Create GitHub release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.ref_name }}
          name: ${{ github.event.repository.name }} ${{ steps.version.outputs.version }}
          draft: false
          generate_release_notes: true
          files: |
            ./artifacts/nupkg/*.nupkg
            ./artifacts/nupkg/*.snupkg
